{% extends "base.html" %}

{% block content %}
<style>
  /* ================= COUNTRIES MAP ANIMATIONS ================= */
  .origin {
    fill: var(--leaf) !important;
    stroke: var(--paper-warm) !important;
    stroke-width: 3 !important;
    filter: drop-shadow(0 0 15px var(--leaf)) !important;
    animation: originPulse 2.6s ease-in-out infinite !important;
    transform-origin: 1315px 480px;
    transition: filter 0.3s ease !important;
  }

  .origin:hover {
    filter: drop-shadow(0 0 25px var(--leaf)) !important;
  }

  @keyframes originPulse {
    0% {
      transform: scale(1);
      opacity: 1;
    }

    50% {
      transform: scale(1.7);
      opacity: 0.65;
    }

    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  .route {
    fill: none !important;
    stroke: var(--leaf) !important;
    stroke-width: 2.1 !important;
    stroke-dasharray: 12 16 !important;
    filter: drop-shadow(0 0 8px rgba(90, 116, 31, 0.4)) !important;
    animation: routeFlow 5s linear infinite !important;
    opacity: 0.8;
    transition: opacity 0.3s ease, stroke-width 0.3s ease !important;
  }

  .route:hover {
    opacity: 1 !important;
    stroke-width: 2.8 !important;
  }

  @keyframes routeFlow {
    from {
      stroke-dashoffset: 0;
    }

    to {
      stroke-dashoffset: -300;
    }
  }

  .destination {
    fill: var(--leaf) !important;
    opacity: 0.9 !important;
    filter: drop-shadow(0 0 6px rgba(90, 116, 31, 0.3)) !important;
    transition: all 0.3s ease !important;
    cursor: pointer !important;
  }

  .destination:hover {
    r: 12px !important;
    filter: drop-shadow(0 0 15px var(--leaf)) !important;
    opacity: 1 !important;
  }

  .country-label {
    fill: var(--leaf-dark) !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.8) !important;
    transition: font-size 0.3s ease, fill 0.3s ease !important;
    cursor: pointer !important;
  }

  .country-label:hover {
    font-size: 16px !important;
    fill: var(--leaf) !important;
  }

  .map-container svg {
    overflow: visible !important;
  }
</style>


<section class="global-network inner-page-section show">
  <h2 class="glass-heading">Our Global Presence</h2>
  <p class="subtitle">Delivering nature's finest to the world.</p>

  <div class="map-container" id="mapContainer">
    <svg viewBox="0 0 2000 1000" preserveAspectRatio="xMidYMid meet">
      <image href="{{ url_for('static', filename='images/worldmap.svg') }}" width="2000" height="1000" />
      <circle class="origin" cx="1315" cy="480" r="10" />
      <path class="route" d="M1315 480 Q1200 600 1210 650" />
      <path class="route" d="M1315 480 Q1150 300 990 280" />
      <path class="route" d="M1315 480 Q1250 450 1200 420" />
      <path class="route" d="M1315 480 Q1120 300 1010 290" />
      <path class="route" d="M1315 480 Q1420 420 1475 410" />
      <path class="route" d="M1315 480 Q800 350 580 360" />
      <path class="route" d="M1315 480 Q1500 600 1580 680" />
      <circle class="destination" cx="1210" cy="650" r="8" />
      <text class="country-label" x="1225" y="655">Mauritius</text>
      <circle class="destination" cx="990" cy="280" r="8" />
      <text class="country-label" x="1005" y="285">Netherlands</text>
      <circle class="destination" cx="1200" cy="420" r="8" />
      <text class="country-label" x="1215" y="425">Dubai</text>
      <circle class="destination" cx="1010" cy="290" r="8" />
      <text class="country-label" x="1025" y="295">Germany</text>
      <circle class="destination" cx="1475" cy="410" r="8" />
      <text class="country-label" x="1490" y="415">Hong Kong</text>
      <circle class="destination" cx="580" cy="360" r="8" />
      <text class="country-label" x="595" y="365">North America</text>
      <circle class="destination" cx="1580" cy="680" r="8" />
      <text class="country-label" x="1560" y="700">Australia</text>
    </svg>
  </div>
</section>

<script>
  // ================= POINTER TRACKING FOR MAP ================= 
  document.addEventListener('DOMContentLoaded', function() {
    const mapContainer = document.getElementById('mapContainer');
    const svg = mapContainer?.querySelector('svg');
    const destinations = svg?.querySelectorAll('.destination');
    const origin = svg?.querySelector('.origin');
    const routes = svg?.querySelectorAll('.route');

    if (!svg) return;

    svg.addEventListener('mousemove', function(e) {
      const rect = svg.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      // Scale coordinates to SVG viewBox
      const svgX = (x / rect.width) * 2000;
      const svgY = (y / rect.height) * 1000;

      // Enhance glow effect on nearest destination
      destinations?.forEach(dest => {
        const destX = parseFloat(dest.getAttribute('cx'));
        const destY = parseFloat(dest.getAttribute('cy'));
        const distance = Math.sqrt(Math.pow(svgX - destX, 2) + Math.pow(svgY - destY, 2));
        const intensity = Math.max(0, 1 - distance / 400);
        
        const filter = `drop-shadow(0 0 ${6 + intensity * 15}px rgba(90, 116, 31, ${0.3 + intensity * 0.7}))`;
        dest.style.filter = filter;
      });

      // Enhance origin glow
      if (origin) {
        const originX = parseFloat(origin.getAttribute('cx'));
        const originY = parseFloat(origin.getAttribute('cy'));
        const distance = Math.sqrt(Math.pow(svgX - originX, 2) + Math.pow(svgY - originY, 2));
        const intensity = Math.max(0, 1 - distance / 500);
        
        const filter = `drop-shadow(0 0 ${15 + intensity * 20}px var(--leaf))`;
        origin.style.filter = filter;
      }

      // Enhance route glow on hover
      routes?.forEach(route => {
        route.style.opacity = 0.8 + (0.2 * Math.random());
      });
    });

    // Reset glow on mouse leave
    svg.addEventListener('mouseleave', function() {
      destinations?.forEach(dest => {
        dest.style.filter = 'drop-shadow(0 0 6px rgba(90, 116, 31, 0.3))';
      });
      
      if (origin) {
        origin.style.filter = 'drop-shadow(0 0 15px var(--leaf))';
      }

      routes?.forEach(route => {
        route.style.opacity = '0.8';
      });
    });
  });
</script>

{% endblock %}
